sonar.projectKey=ai-resume-analyzer
sonar.projectName=AI Resume Analyzer
sonar.projectVersion=1.0

sonar.host.url=http://localhost:9000

# Source roots
sonar.sources=backend,frontend/src

# Exclusions (generated / third-party / tooling)
sonar.exclusions=**/node_modules/**,**/__pycache__/**,**/*.min.js,**/dist/**,**/build/**,**/.venv/**,**/venv/**,**/env/**,**/.pytest_cache/**,**/coverage/**,**/.mypy_cache/**,**/.ruff_cache/**,**/sonarqube-*/**,**/tools/sonar-scanner/**,**/hs_err_pid*.log

# Helps keep analysis stable on mixed-language repos
sonar.sourceEncoding=UTF-8
